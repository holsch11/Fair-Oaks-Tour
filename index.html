<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3511 Fair Oaks Ct — Longboat Key, FL</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5f0e8;
    --warm-white: #faf8f4;
    --driftwood: #b8a48a;
    --deep-teal: #1a3a3a;
    --sea-glass: #4a7c74;
    --gold: #c9a84c;
    --text: #2c2c2c;
    --muted: #8a8278;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-teal);
    font-family: 'Jost', sans-serif;
    color: var(--sand);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(26,58,58,0.95), transparent);
    backdrop-filter: blur(2px);
  }

  .header-address {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--sand);
    opacity: 0.9;
  }

  .header-address span {
    color: var(--gold);
    font-style: italic;
  }

  .header-count {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--driftwood);
    font-weight: 300;
  }

  /* ─── HERO / MAIN VIEWER ─── */
  .viewer {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: pointer;
  }

  .main-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.4s ease;
    display: block;
  }

  .main-img.fade {
    opacity: 0;
  }

  /* overlay gradient */
  .viewer::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(to top, rgba(26,58,58,0.85), transparent);
    pointer-events: none;
  }

  /* ─── NAV ARROWS ─── */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    background: rgba(26,58,58,0.55);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.25s;
    backdrop-filter: blur(6px);
  }
  .nav-btn:hover {
    background: rgba(201,168,76,0.25);
    border-color: var(--gold);
    transform: translateY(-50%) scale(1.08);
  }
  .nav-prev { left: 24px; }
  .nav-next { right: 24px; }

  /* ─── CAPTION ─── */
  .caption {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  .caption-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--warm-white);
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    display: block;
    min-height: 2.2rem;
    transition: opacity 0.3s;
  }

  .caption-num {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 6px;
    display: block;
    opacity: 0.85;
  }

  /* ─── PROGRESS BAR ─── */
  .progress-bar {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: min(420px, 60vw);
    height: 1px;
    background: rgba(255,255,255,0.15);
    border-radius: 1px;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 1px;
    transition: width 0.35s ease;
  }

  /* ─── THUMBNAIL STRIP ─── */
  .thumb-strip {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    background: linear-gradient(to top, rgba(15,35,35,0.97) 70%, transparent);
    padding: 14px 0 16px;
  }

  .thumb-track {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 24px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--sea-glass) transparent;
  }

  .thumb-track::-webkit-scrollbar { height: 3px; }
  .thumb-track::-webkit-scrollbar-thumb { background: var(--sea-glass); border-radius: 2px; }

  .thumb {
    flex-shrink: 0;
    width: 68px; height: 50px;
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    opacity: 0.55;
  }

  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb:hover { opacity: 0.85; border-color: rgba(201,168,76,0.5); }
  .thumb.active {
    border-color: var(--gold);
    opacity: 1;
    transform: scale(1.05);
    box-shadow: 0 0 12px rgba(201,168,76,0.4);
  }

  /* ─── SECTION LABELS (tour groups) ─── */
  .section-badge {
    position: absolute;
    top: 80px;
    left: 40px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.8;
  }

  .section-name {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    opacity: 0.85;
  }

  /* ─── SLIDESHOW TOGGLE ─── */
  .controls-bar {
    position: absolute;
    top: 80px; right: 40px;
    z-index: 10;
    display: flex;
    gap: 10px;
  }

  .ctrl-btn {
    background: rgba(26,58,58,0.55);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--driftwood);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Jost', sans-serif;
    backdrop-filter: blur(6px);
  }

  .ctrl-btn:hover, .ctrl-btn.active {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ─── LOADING SHIMMER ─── */
  .shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--deep-teal) 25%, #1f4545 50%, var(--deep-teal) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    z-index: 5;
    display: none;
  }
  .shimmer.show { display: block; }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* ─── FULLSCREEN HINT ─── */
  .fullscreen-hint {
    position: absolute;
    bottom: 86px;
    right: 24px;
    z-index: 10;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
  }

  /* keyboard hint */
  @media (min-width: 768px) {
    .key-hint {
      display: block;
      position: absolute;
      bottom: 86px;
      left: 24px;
      z-index: 10;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
    }
  }
  .key-hint { display: none; }
</style>
</head>
<body>

<header class="header">
  <div class="header-address">3511 Fair Oaks Ct &nbsp;·&nbsp; <span>Longboat Key, FL</span> &nbsp;·&nbsp; Queens Harbour</div>
  <div class="header-count" id="headerCount">1 / 70</div>
</header>

<div class="viewer" id="viewer">
  <div class="shimmer" id="shimmer"></div>
  <img class="main-img" id="mainImg" src="" alt="Property photo" loading="eager">

  <div class="section-badge">
    <div class="section-dot"></div>
    <div class="section-name" id="sectionName">Exterior</div>
  </div>

  <div class="controls-bar">
    <button class="ctrl-btn" id="slideBtn" onclick="toggleSlideshow()">▶ Slideshow</button>
    <button class="ctrl-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  </div>

  <button class="nav-btn nav-prev" onclick="go(-1)">&#8592;</button>
  <button class="nav-btn nav-next" onclick="go(1)">&#8594;</button>

  <div class="caption">
    <span class="caption-label" id="captionLabel"></span>
    <span class="caption-num" id="captionNum">Photo 1 of 70</span>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:1.43%"></div>
  </div>

  <div class="key-hint">← → arrow keys to navigate</div>
  <div class="fullscreen-hint">Click image for fullscreen</div>
</div>

<div class="thumb-strip">
  <div class="thumb-track" id="thumbTrack"></div>
</div>

<script>
const BASE = 'https://pix360.com/images_tours';
const START = 2713056;
const COUNT = 70;

// Build photo list with guided tour labels
const tourSections = [
  { from: 0,  to: 5,  section: 'Exterior',         label: 'Exterior — Cul-de-sac & Curb Appeal' },
  { from: 1,  to: 1,  section: 'Exterior',         label: 'Front Entry' },
  { from: 2,  to: 2,  section: 'Exterior',         label: 'Driveway & Garage' },
  { from: 3,  to: 3,  section: 'Exterior',         label: 'Covered Lanai' },
  { from: 4,  to: 4,  section: 'Exterior',         label: 'Pool & Spa Overview' },
  { from: 5,  to: 5,  section: 'Pool & Outdoor',   label: 'Pool — Screen Enclosure' },
  { from: 6,  to: 8,  section: 'Pool & Outdoor',   label: 'Pool & Golf Course Views' },
  { from: 9,  to: 9,  section: 'Pool & Outdoor',   label: 'Outdoor Grill Area' },
  { from: 10, to: 10, section: 'Pool & Outdoor',   label: 'Rear Yard & Landscaping' },
  { from: 11, to: 13, section: 'Foyer & Entry',    label: 'Grand Foyer' },
  { from: 14, to: 14, section: 'Foyer & Entry',    label: 'Entry Hall' },
  { from: 15, to: 19, section: 'Great Room',       label: 'Great Room — Coffered Ceilings & Wet Bar' },
  { from: 20, to: 20, section: 'Great Room',       label: 'Great Room — Golf Course Views' },
  { from: 21, to: 24, section: 'Dining Room',      label: 'Formal Dining Room' },
  { from: 25, to: 29, section: 'Kitchen',          label: 'Chef\'s Kitchen — Granite & Wood Cabinets' },
  { from: 30, to: 31, section: 'Kitchen',          label: 'Kitchen — Breakfast Nook' },
  { from: 32, to: 36, section: 'Primary Suite',    label: 'Primary Suite — 360 sq ft' },
  { from: 37, to: 39, section: 'Primary Suite',    label: 'Primary Bath — Split Vanities & Soaking Tub' },
  { from: 40, to: 40, section: 'Primary Suite',    label: 'Primary Walk-In Closet' },
  { from: 41, to: 44, section: 'Bedroom 2',        label: 'Guest Bedroom 2' },
  { from: 45, to: 48, section: 'Bedroom 3',        label: 'Guest Bedroom 3' },
  { from: 49, to: 51, section: 'Den / Office',     label: 'Den / Home Office' },
  { from: 52, to: 54, section: 'Laundry & Utility', label: 'Laundry Room' },
  { from: 55, to: 59, section: 'Pool & Outdoor',   label: 'Sunset — Pool & Golf Course' },
  { from: 60, to: 64, section: 'Aerial',           label: 'Aerial — Bay Isles & Longboat Key Club' },
  { from: 65, to: 69, section: 'Aerial',           label: 'Aerial — Gulf & Community Views' },
];

// Build per-photo metadata
const photos = Array.from({ length: COUNT }, (_, i) => {
  const id = START + i;
  let meta = { section: 'Exterior', label: `Photo ${i + 1}` };
  for (const s of tourSections) {
    if (i >= s.from && i <= s.to) { meta = { section: s.section, label: s.label }; break; }
  }
  return {
    id,
    full: `${BASE}/pm/${41906}_${id}_pl.jpg`,
    thumb: `${BASE}/pt/${41906}_${id}_tmb.jpg`,
    section: meta.section,
    label: meta.label,
  };
});

let current = 0;
let slideshowTimer = null;
const mainImg = document.getElementById('mainImg');
const shimmer = document.getElementById('shimmer');
const thumbTrack = document.getElementById('thumbTrack');
const progressFill = document.getElementById('progressFill');
const captionLabel = document.getElementById('captionLabel');
const captionNum = document.getElementById('captionNum');
const sectionName = document.getElementById('sectionName');
const headerCount = document.getElementById('headerCount');
const slideBtn = document.getElementById('slideBtn');

// Build thumbnails
photos.forEach((p, i) => {
  const div = document.createElement('div');
  div.className = 'thumb' + (i === 0 ? ' active' : '');
  div.id = `t${i}`;
  div.onclick = () => goTo(i);
  const img = document.createElement('img');
  img.src = p.thumb;
  img.alt = p.label;
  img.loading = 'lazy';
  div.appendChild(img);
  thumbTrack.appendChild(div);
});

function goTo(idx) {
  if (idx < 0) idx = COUNT - 1;
  if (idx >= COUNT) idx = 0;

  const p = photos[idx];

  // Fade out
  mainImg.classList.add('fade');

  setTimeout(() => {
    mainImg.src = p.full;
    mainImg.onload = () => {
      mainImg.classList.remove('fade');
      shimmer.classList.remove('show');
    };
    mainImg.onerror = () => {
      // fallback to thumbnail if full not available
      mainImg.src = p.thumb;
      mainImg.classList.remove('fade');
      shimmer.classList.remove('show');
    };
  }, 200);

  // Update UI
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  const activeThumb = document.getElementById(`t${idx}`);
  if (activeThumb) {
    activeThumb.classList.add('active');
    activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  progressFill.style.width = ((idx + 1) / COUNT * 100).toFixed(2) + '%';
  captionLabel.textContent = p.label;
  captionNum.textContent = `Photo ${idx + 1} of ${COUNT}`;
  sectionName.textContent = p.section;
  headerCount.textContent = `${idx + 1} / ${COUNT}`;

  current = idx;
}

function go(dir) { goTo(current + dir); }

function toggleSlideshow() {
  if (slideshowTimer) {
    clearInterval(slideshowTimer);
    slideshowTimer = null;
    slideBtn.textContent = '▶ Slideshow';
    slideBtn.classList.remove('active');
  } else {
    slideshowTimer = setInterval(() => go(1), 3500);
    slideBtn.textContent = '⏸ Pause';
    slideBtn.classList.add('active');
  }
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.getElementById('viewer').requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

// Click image = next
document.getElementById('viewer').addEventListener('click', (e) => {
  if (e.target.classList.contains('nav-btn') || e.target.closest('.nav-btn') ||
      e.target.classList.contains('ctrl-btn') || e.target.closest('.ctrl-btn')) return;
  go(1);
});

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  if (e.key === 'f') toggleFullscreen();
  if (e.key === 's') toggleSlideshow();
});

// Touch swipe
let touchStartX = 0;
document.getElementById('viewer').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('viewer').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
});

// Init
goTo(0);
</script>
</body>
</html>
